services:
  - type: web
    name: baron-ai-bot
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --webhook
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEBHOOK_MODE
        value: false
      - key: USER_TIMEZONE
        value: Africa/Accra
      - key: ON_RENDER
        value: true
