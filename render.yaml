services:
  - type: web
    name: baron-ai-bot
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEBHOOK_MODE
        value: true
      - key: WEBHOOK_URL
        fromService:
          type: web
          property: host
          value: https://${self.host}
      - key: PORT
        fromService:
          type: web
          property: port
      - key: USER_TIMEZONE
        value: Africa/Accra
